<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeX Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">

    <!-- MathJax v4 — served locally from node_modules via scripts/copy-mathjax.mjs.
         The config object MUST be defined before the script tag loads. -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath:  [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: { '[+]': ['ams', 'boldsymbol'] },
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
            },
            output: {
                font: 'mathjax-modern',
            },
            startup: {
                typeset: false,
            },
        };
    </script>
    <script src="/mathjax/tex-chtml.js"></script>
</head>
<body>

    <!-- Top toolbar -->
    <div class="toolbar">
        <div class="toolbar-brand">
            <span class="brand-icon">∑</span>
            <span class="brand-name">TeX<em>Board</em></span>
        </div>
        <div class="toolbar-actions">
            <button class="tool-btn create-btn" id="addTextareaBtn" title="Add node (N)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                New Node
            </button>
            <button class="tool-btn connect-btn" id="toggleLineBtn" title="Connect nodes (C)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="2.5" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="11.5" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 7h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span id="connectLabel">Connect</span>
            </button>
            <button class="tool-btn clear-btn" id="clearLinesBtn" title="Clear all connections">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Clear Lines
            </button>
            <button class="tool-btn export-btn" id="exportBtn" title="Export board (Ctrl+S)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Export
            </button>
            <button class="tool-btn load-btn" id="loadBtn" title="Load board from file">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 10V2M4 5l3-3 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Load
            </button>
        </div>

        <!-- Zoom controls -->
        <div class="zoom-controls">
            <button class="tool-btn zoom-btn" id="zoomOutBtn" title="Zoom out (-)">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <span class="zoom-level" id="zoomLevel" title="Reset view (R)">100%</span>
            <button class="tool-btn zoom-btn" id="zoomInBtn" title="Zoom in (+)">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <button class="tool-btn reset-view-btn" id="resetViewBtn" title="Reset view (R)">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7a5 5 0 1 1 1.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 11V7h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Reset
            </button>
        </div>

    </div>

    <!-- SVG overlay for connection lines (fixed, outside canvas-layer) -->
    <svg id="svg-canvas">
        <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M 0 1.5 L 8.5 5 L 0 8.5 z" fill="var(--accent)"/>
            </marker>
            <marker id="arrow-preview" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M 0 1.5 L 8.5 5 L 0 8.5 z" fill="var(--accent-dim)"/>
            </marker>
            <filter id="glow">
                <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
        </defs>
    </svg>

    <!-- Infinite canvas workspace -->
    <div id="workspace">
        <!--
            canvas-layer is the single element that receives pan/zoom transforms.
            All nodes are appended here as direct children with pixel-based
            top/left positions in canvas-local coordinates.
        -->
        <div id="canvas-layer">
            <div class="draggable-container" style="top: 180px; left: 160px;" data-label="Node A">
                <div class="node-header">
                    <div class="drag-handle">
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
                            <path d="M0 1h12M0 4h12M0 7h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <input class="node-title" type="text" value="Node A" placeholder="Label…" spellcheck="false">
                    <button class="node-delete" title="Delete node">
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                </div>
                <div class="editor-wrapper">
                    <textarea placeholder="Type TeX here…&#10;e.g. $E = mc^2$"></textarea>
                    <div class="tex-preview"></div>
                </div>
                <div class="node-connect-dot" data-dir="top"></div>
                <div class="node-connect-dot" data-dir="right"></div>
                <div class="node-connect-dot" data-dir="bottom"></div>
                <div class="node-connect-dot" data-dir="left"></div>
            </div>

            <div class="draggable-container" style="top: 180px; left: 560px;" data-label="Node B">
                <div class="node-header">
                    <div class="drag-handle">
                        <svg width="12" height="8" viewBox="0 0 12 8" fill="none">
                            <path d="M0 1h12M0 4h12M0 7h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <input class="node-title" type="text" value="Node B" placeholder="Label…" spellcheck="false">
                    <button class="node-delete" title="Delete node">
                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                </div>
                <div class="editor-wrapper">
                    <textarea placeholder="Type TeX here…&#10;e.g. $$\int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}$$"></textarea>
                    <div class="tex-preview"></div>
                </div>
                <div class="node-connect-dot" data-dir="top"></div>
                <div class="node-connect-dot" data-dir="right"></div>
                <div class="node-connect-dot" data-dir="bottom"></div>
                <div class="node-connect-dot" data-dir="left"></div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Hidden file input for Load -->
    <input type="file" id="fileInput" accept=".json,application/json"
           style="display:none" aria-hidden="true">

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
